services:
  # SQL Server 数据库
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: creator-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - creator-network

  # 数据库初始化服务
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: creator-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - SA_PASSWORD=YourStrong@Passw0rd
      - DB_HOST=sqlserver
    volumes:
      - ./backend/init-db.sql:/scripts/init-db.sql
      - ./scripts/init-db.sh:/scripts/init-db.sh
    entrypoint: ["/bin/bash", "/scripts/init-db.sh"]
    command: []
    networks:
      - creator-network
    restart: "no"

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creator-backend
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=creator_platform
      - DB_USER=sa
      - DB_PASSWORD=YourStrong@Passw0rd
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - creator-network
    restart: unless-stopped

  # 用户端前端
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: creator-frontend-user
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - creator-network
    restart: unless-stopped

  # 管理后台前端
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: creator-frontend-admin
    ports:
      - "8082:80"
    depends_on:
      - backend
    networks:
      - creator-network
    restart: unless-stopped

networks:
  creator-network:
    driver: bridge

volumes:
  sqlserver_data:
  uploads_data:
